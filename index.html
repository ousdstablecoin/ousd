<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUSD - Future Gateway</title>
    <!-- Enlace al archivo CSS externo -->
    <link rel="stylesheet" href="css.css">
    <!-- Fuente futurista de Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- Capas de fondo espacial -->
    <div class="space-bg"></div>
    
    <!-- NUEVO: Fondo de Vídeo en Bucle Completo -->
    <video class="video-bg" autoplay loop muted playsinline>
        <!-- REEMPLAZA EL CONTENIDO DE src POR LA RUTA DE TU ARCHIVO DE VÍDEO (Ej: "video.mp4") -->
        <source src="images/ousd.mp4" type="video/mp4">
        Tu navegador no soporta vídeos de fondo.
    </video>

    <!-- Canvas para renderizar los asteroides interactivos -->
    <canvas id="asteroidCanvas"></canvas>

    <!-- Imagen del Astronauta Táctico -->
    <img class="astronaut" src="https://pixabay.com" alt="Astronauta Táctico">

    <!-- Interfaz HUD del sistema -->
    <div class="hud-overlay">
        <div class="hud-line"></div>
    </div>

    <!-- Contenedor central principal -->
    <div class="center-container">
        <h1 class="brand-title">OUSD</h1>
        <div class="hud-text">Transmisión Espacial // Enlaces del Sistema</div>
        
        <!-- Menú de Enlaces Tecnológicos -->
        <nav class="tech-menu">
            <a href="#core" class="menu-item" data-stars="6">NÚCLEO</a>
            <a href="#orbit" class="menu-item" data-stars="6">ÓRBITA</a>
            <a href="#network" class="menu-item" data-stars="6">RED CUÁNTICA</a>
            <a href="#terminal" class="menu-item" data-stars="6">TERMINAL</a>
        </nav>
    </div>

    <!-- Enlace al archivo JavaScript externo -->
    <script src="js.js"></script>
</body>
</html>
