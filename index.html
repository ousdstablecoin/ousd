<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUSD - Future Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            background-color: #020208;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fondos */
        .space-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(20, 10, 40, 0.6), transparent 80%),
                url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: saturate(1.2) brightness(0.7);
        }

        .milky-way {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            mix-blend-mode: screen;
            opacity: 0.35;
            z-index: 2;
            animation: nebulaPulse 15s infinite alternate ease-in-out;
        }

        /* Lienzo interactivo de Asteroides */
        #asteroidCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* Astronauta Dinámico */
        .astronaut {
            position: absolute;
            bottom: 8%;
            right: 12%;
            width: 260px;
            height: auto;
            z-index: 4;
            filter: drop-shadow(0 0 25px rgba(0, 229, 255, 0.4));
            opacity: 0.9;
            animation: spaceDrift 12s infinite ease-in-out;
            transition: transform 0.2s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        /* HUD & Interfaz */
        .hud-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0, 229, 255, 0.1);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
            z-index: 5;
            pointer-events: none;
        }

        .hud-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.3), transparent);
            width: 100%;
            height: 2px;
            top: 0;
            animation: scanline 8s infinite linear;
        }

        /* Contenedor OUSD */
        .center-container {
            position: relative;
            z-index: 6;
            text-align: center;
        }

        .brand-title {
            font-size: 8rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 15px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, #00e5ff 70%, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.5));
            animation: titlePulse 4s infinite ease-in-out;
        }

        .hud-text {
            color: #00e5ff;
            font-size: 0.9rem;
            letter-spacing: 6px;
            margin-top: 15px;
            text-transform: uppercase;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        /* Animaciones CSS */
        @keyframes nebulaPulse {
            0% { opacity: 0.25; transform: scale(1); }
            100% { opacity: 0.45; transform: scale(1.05); }
        }

        @keyframes spaceDrift {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(4deg); }
        }

        @keyframes scanline {
            0% { top: 0%; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.5)); }
            50% { filter: drop-shadow(0 0 45px rgba(189, 0, 255, 0.7)); }
        }

        @media (max-width: 768px) {
            .brand-title { font-size: 4.5rem; letter-spacing: 8px; }
            .astronaut { width: 150px; right: 5%; bottom: 5%; }
        }
    </style>
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="space-bg"></div>
    <div class="milky-way"></div>

    <!-- Canvas para renderizar los asteroides en movimiento -->
    <canvas id="asteroidCanvas"></canvas>

    <img class="astronaut" src="https://cdn.pixabay.com/photo/2024/08/16/22/20/ai-generated-8974746_1280.jpg" alt="Astronauta">

    <div class="hud-overlay">
        <div class="hud-line"></div>
    </div>

    <div class="center-container">
        <h1 class="brand-title">OUSD</h1>
        <div class="hud-text">Transmisión Espacial // Cinturón de Asteroides Activo</div>
    </div>

    <script>
        // --- 1. Motor de Asteroides (HTML5 Canvas) ---
        const canvas = document.getElementById('asteroidCanvas');
        const ctx = canvas.getContext('2d');

        // Ajustar el canvas al tamaño real de la ventana
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Clase que define las propiedades y comportamiento de cada asteroide
        class Asteroid {
            constructor() {
                this.reset();
                // Distribución inicial aleatoria por toda la pantalla al cargar la página
                this.x = Math.random() * canvas.width;
            }

            reset() {
                // Aparecen siempre desde el lado izquierdo de la pantalla
                this.x = -50;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 6 + 2; // Tamaños pequeños para dar profundidad de fondo
                this.speedX = Math.random() * 1.5 + 0.5; // Velocidad de traslación horizontal
                this.speedY = (Math.random() - 0.5) * 0.5; // Ligera desviación vertical
                this.opacity = Math.random() * 0.5 + 0.3; // Transparencia variable
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Si sale de los límites de la pantalla, se reinicia al inicio
                if (this.x > canvas.width + 50 || this.y < -50 || this.y > canvas.height + 50) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(150, 170, 190, ${this.opacity})`;
                ctx.shadowBlur = this.size * 2;
                ctx.shadowColor = "rgba(0, 229, 255, 0.3)"; // Brillo cósmico azul tenue
                ctx.fill();
                ctx.closePath();
            }
        }

        // Crear un cinturón con 40 asteroides activos en paralelo
        const asteroidBelt = [];
        for (let i = 0; i < 40; i++) {
            asteroidBelt.push(new Asteroid());
        }

        // Bucle infinito de renderizado fluido
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            asteroidBelt.forEach(asteroid => {
                asteroid.update();
                asteroid.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // --- 2. Efecto Parallax interactivo del Astronauta con el Ratón ---
        const astronaut = document.querySelector('.astronaut');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 30;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 30;
            astronaut.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
        });
    </script>
</body>
</html>
