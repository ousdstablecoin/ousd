<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUSD - Future Gateway</title>
    <style>
        /* Reset básico y configuración de pantalla completa */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Orbitron', 'Segoe UI', Roboto, sans-serif;
            background-color: #020208;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Capas de fondo espacial */
        .space-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(20, 10, 40, 0.6), transparent 80%),
                url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: saturate(1.2) brightness(0.8);
            animation: spaceSlowMove 60s infinite linear;
        }

        /* Superposición de la Vía Láctea / Nebulosa */
        .milky-way {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            mix-blend-mode: screen;
            opacity: 0.35;
            z-index: 2;
            animation: nebulaPulse 12s infinite alternate ease-in-out;
        }

        /* Elemento del Astronauta Flotando */
        .astronaut {
            position: absolute;
            bottom: 10%;
            right: 10%;
            width: 280px;
            height: auto;
            z-index: 3;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.4));
            animation: floatAstronaut 8s infinite ease-in-out;
            opacity: 0.85;
        }

        /* Interfaz Futurista (HUD Overlay) */
        .hud-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
            z-index: 4;
            pointer-events: none;
        }

        .hud-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.4), transparent);
            width: 100%;
            height: 2px;
            top: 15%;
            animation: scanline 6s infinite linear;
        }

        /* Contenedor Central */
        .center-container {
            position: relative;
            z-index: 5;
            text-align: center;
            perspective: 1000px;
        }

        /* Texto Principal OUSD */
        .brand-title {
            font-size: 8rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 15px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            background: linear-gradient(135deg, #fff 30%, #00e5ff 70%, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.6));
            animation: titleGlitch 4s infinite scaleUp;
        }

        /* Subtexto o Detalles del HUD */
        .hud-text {
            color: #00e5ff;
            font-size: 0.9rem;
            letter-spacing: 6px;
            margin-top: 15px;
            text-transform: uppercase;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* ---- ANIMACIONES ---- */
        @keyframes spaceSlowMove {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes nebulaPulse {
            0% { opacity: 0.25; transform: scale(1); }
            100% { opacity: 0.45; transform: scale(1.08); }
        }

        @keyframes floatAstronaut {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes scanline {
            0% { top: 0%; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Efecto sutil de parpadeo holográfico */
        @keyframes titleGlitch {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.6)); }
            92% { filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.6)); transform: skew(0deg); }
            94% { filter: drop-shadow(0 0 40px rgba(189, 0, 255, 0.8)); transform: skew(2deg); }
            96% { filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.4)); transform: skew(-2deg); }
            98% { filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.6)); transform: skew(0deg); }
        }

        /* Responsivo para móviles */
        @media (max-width: 768px) {
            .brand-title { font-size: 4.5rem; letter-spacing: 8px; }
            .astronaut { width: 160px; right: 5%; bottom: 5%; }
            .hud-text { font-size: 0.7rem; letter-spacing: 4px; }
        }
    </style>
    <!-- Fuente futurista de Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- Capas de fondo espacial -->
    <div class="space-bg"></div>
    <div class="milky-way"></div>

    <!-- Elemento del astronauta transparente (PNG de stock espacial) -->
    <img class="astronaut" src="https://postimg.cc" alt="Astronauta">

    <!-- Marco e interfaz HUD del sistema -->
    <div class="hud-overlay">
        <div class="hud-line"></div>
    </div>

    <!-- Contenido central principal -->
    <div class="center-container">
        <h1 class="brand-title">OUSD</h1>
        <div class="hud-text">Sistema Orbital Activo // Protocolo Cuántico</div>
    </div>

</body>
</html>
